<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Journal entry workflow illustration</title>
  <desc id="desc">An abstract workflow showing spreadsheet entries moving through validation, approval, audit trail, and import into MRI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1A1A"/>
      <stop offset="0.5" stop-color="#1B3A20"/>
      <stop offset="1" stop-color="#2D5016"/>
    </linearGradient>
    <radialGradient id="glowLime" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 165) rotate(137) scale(420 330)">
      <stop stop-color="#BCD632" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#BCD632" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 600) rotate(-38) scale(430 260)">
      <stop stop-color="#A0C9C9" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#A0C9C9" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .label { font-family: Inter, Arial, sans-serif; font-weight: 800; letter-spacing: -0.03em; }
      .small { font-family: Inter, Arial, sans-serif; font-weight: 700; letter-spacing: 0.02em; }
      .micro { font-family: Inter, Arial, sans-serif; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="760" rx="34" fill="url(#glowLime)"/>
  <rect width="1200" height="760" rx="34" fill="url(#glowTeal)"/>

  <g opacity="0.16">
    <path d="M804 520H942V324L873 270L804 324V520Z" stroke="white" stroke-width="4"/>
    <path d="M882 520H1028V366L955 310L882 366V520Z" stroke="white" stroke-width="4"/>
    <path d="M848 370H878M848 416H878M848 462H878M930 410H960M930 456H960" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="116" width="276" height="320" rx="24" fill="white" fill-opacity="0.95"/>
    <rect x="92" y="116" width="276" height="58" rx="24" fill="#F3F4F6"/>
    <circle cx="124" cy="145" r="7" fill="#D1D5DB"/>
    <circle cx="148" cy="145" r="7" fill="#D1D5DB"/>
    <circle cx="172" cy="145" r="7" fill="#D1D5DB"/>
    <text x="118" y="214" class="micro" font-size="15" fill="#2D5016">SOURCE DATA</text>
    <rect x="118" y="242" width="224" height="34" rx="8" fill="#F3F4F6"/>
    <rect x="118" y="292" width="224" height="34" rx="8" fill="#F3F4F6"/>
    <rect x="118" y="342" width="162" height="34" rx="8" fill="#F3F4F6"/>
    <rect x="132" y="254" width="52" height="10" rx="5" fill="#2D5016" fill-opacity="0.55"/>
    <rect x="204" y="254" width="96" height="10" rx="5" fill="#A0C9C9"/>
    <rect x="132" y="304" width="76" height="10" rx="5" fill="#2D5016" fill-opacity="0.55"/>
    <rect x="226" y="304" width="72" height="10" rx="5" fill="#A0C9C9"/>
    <rect x="132" y="354" width="48" height="10" rx="5" fill="#2D5016" fill-opacity="0.55"/>
    <rect x="200" y="354" width="52" height="10" rx="5" fill="#A0C9C9"/>
  </g>

  <path d="M390 276H482" stroke="#BCD632" stroke-width="8" stroke-linecap="round"/>
  <path d="M462 248L492 276L462 304" stroke="#BCD632" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="500" y="92" width="410" height="390" rx="32" fill="#102319" fill-opacity="0.88" stroke="white" stroke-opacity="0.14"/>
    <text x="548" y="157" class="micro" font-size="16" fill="#BCD632">JOURNAL ENTRY WORKFLOW</text>
    <text x="548" y="212" class="label" font-size="44" fill="white">Validate.</text>
    <text x="548" y="263" class="label" font-size="44" fill="white">Approve.</text>
    <text x="548" y="314" class="label" font-size="44" fill="white">Import.</text>

    <g transform="translate(548 360)">
      <rect width="314" height="72" rx="18" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.13"/>
      <circle cx="38" cy="36" r="18" fill="#BCD632"/>
      <path d="M29 36L35 42L48 29" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="76" y="24" width="162" height="10" rx="5" fill="white" fill-opacity="0.55"/>
      <rect x="76" y="43" width="102" height="8" rx="4" fill="white" fill-opacity="0.25"/>
    </g>
  </g>

  <g>
    <path d="M676 512V586" stroke="#BCD632" stroke-width="8" stroke-linecap="round"/>
    <path d="M648 566L676 596L704 566" stroke="#BCD632" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="378" y="604" width="594" height="94" rx="28" fill="white" fill-opacity="0.96"/>
    <circle cx="434" cy="651" r="24" fill="#BCD632"/>
    <path d="M420 651L430 661L450 640" stroke="#1A1A1A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="484" y="643" class="small" font-size="22" fill="#1A1A1A">Approved entries ready for MRI</text>
    <rect x="484" y="664" width="270" height="10" rx="5" fill="#A0C9C9" fill-opacity="0.7"/>
  </g>
</svg>
